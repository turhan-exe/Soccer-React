apply plugin: 'com.android.application'
import groovy.json.JsonSlurper

// Keystore properties dosyasını oku
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def admobPropertiesFile = rootProject.file("admob.properties")
def admobProperties = new Properties()
if (admobPropertiesFile.exists()) {
    admobProperties.load(new FileInputStream(admobPropertiesFile))
}

def admobSampleAppId = "ca-app-pub-3940256099942544~3347511713"
def admobSampleRewardedUnitId = "ca-app-pub-3940256099942544/5224354917"
def admobUseTestIds = admobProperties.getProperty("ADMOB_USE_TEST_IDS", "true").toBoolean()
def configuredAdmobAppId = admobProperties.getProperty("ADMOB_APP_ID_ANDROID", "").trim()
def configuredRewardedUnitId = admobProperties.getProperty("ADMOB_REWARDED_UNIT_ID_ANDROID", "").trim()
def admobAppId = admobUseTestIds
    ? admobSampleAppId
    : admobProperties.getProperty("ADMOB_APP_ID_ANDROID", admobSampleAppId)
def admobRewardedUnitId = admobUseTestIds
    ? admobSampleRewardedUnitId
    : admobProperties.getProperty("ADMOB_REWARDED_UNIT_ID_ANDROID", admobSampleRewardedUnitId)
def hasRealAdmobIds =
    configuredAdmobAppId &&
    configuredRewardedUnitId &&
    configuredAdmobAppId != admobSampleAppId &&
    configuredRewardedUnitId != admobSampleRewardedUnitId
def appVersionFile = rootProject.file("../app.version.json")
def appVersionConfig = appVersionFile.exists()
    ? new JsonSlurper().parse(appVersionFile)
    : [versionName: "1.0.13", versionCode: 2026032613]
def unityArtifactManifestFile = rootProject.file("../.tmp/current-android-artifact-manifest.json")
def unityArtifactConfig = unityArtifactManifestFile.exists()
    ? new JsonSlurper().parse(unityArtifactManifestFile)
    : [buildId: "unknown", runtimeType: "unknown", buildTimestampUtc: ""]
def unityExportBuildId = (unityArtifactConfig.buildId ?: "unknown").toString()
def unityExportRuntimeType = (unityArtifactConfig.runtimeType ?: "unknown").toString()
def unityExportBuildTimestampUtc = (unityArtifactConfig.buildTimestampUtc ?: "").toString()
def unityDebugVersionSuffix = unityExportBuildId == "unknown"
    ? ""
    : "-u" + unityExportBuildId.replaceAll("[^A-Za-z0-9._-]", "_")
def mobileExcludedMatchViewerDir = file("$projectDir/src/main/assets/public/Unity/match-viewer")
def excludeMatchViewerFromMobileAssets = (project.findProperty("excludeMatchViewerFromMobileAssets") ?: "true").toString().toBoolean()

gradle.taskGraph.whenReady { taskGraph ->
    def releaseRequested = taskGraph.allTasks.any { task ->
        task.path.toLowerCase().contains("release")
    }

    if (!releaseRequested) {
        return
    }

    if (!admobPropertiesFile.exists()) {
        throw new GradleException("android/admob.properties is required for release builds.")
    }

    if (admobUseTestIds) {
        throw new GradleException("Release builds cannot use AdMob test IDs. Set ADMOB_USE_TEST_IDS=false.")
    }

    if (!hasRealAdmobIds) {
        throw new GradleException("Release builds require real AdMob app and rewarded unit IDs in android/admob.properties.")
    }
}

tasks.matching { task ->
    task.name ==~ /merge.*Assets/
}.configureEach {
    doFirst {
        if (excludeMatchViewerFromMobileAssets && mobileExcludedMatchViewerDir.exists()) {
            logger.lifecycle("Removing generated mobile asset folder from bundle: ${mobileExcludedMatchViewerDir}")
            delete mobileExcludedMatchViewerDir
        }
    }
}

android {
    namespace "com.nerbuss.fhsmanager"
    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion "27.2.12479018"
    defaultConfig {
        applicationId "com.nerbuss.fhsmanager"
        minSdkVersion 25
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode (appVersionConfig.versionCode as Integer)
        versionName appVersionConfig.versionName.toString()
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        manifestPlaceholders = [admobAppId: admobAppId]
        buildConfigField "String", "ADMOB_APP_ID", "\"${admobAppId}\""
        buildConfigField "String", "ADMOB_REWARDED_AD_UNIT_ID", "\"${admobRewardedUnitId}\""
        buildConfigField "boolean", "ADMOB_USE_TEST_IDS", admobUseTestIds.toString()
        buildConfigField "String", "UNITY_EXPORT_BUILD_ID", "\"${unityExportBuildId}\""
        buildConfigField "String", "UNITY_EXPORT_RUNTIME_TYPE", "\"${unityExportRuntimeType}\""
        buildConfigField "String", "UNITY_EXPORT_BUILD_TIMESTAMP_UTC", "\"${unityExportBuildTimestampUtc}\""
        buildConfigField "String", "UNITY_VERSION_NAME", "\"${appVersionConfig.versionName.toString()}\""
    }
    androidResources {
        ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        noCompress += ['data', 'wasm']
    }
    
    // Signing config for release
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }
    
    buildTypes {
        debug {
            versionNameSuffix unityDebugVersionSuffix
        }
        release {
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    packagingOptions {
        jniLibs {
            // Unity as Library bazı cihazlarda native lib'lerin extract edilmesini bekliyor.
            useLegacyPackaging true
        }
    }
    buildFeatures {
        buildConfig true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
    implementation "com.android.billingclient:billing:8.3.0"
    implementation "com.google.android.play:app-update:2.1.0"
    implementation "com.google.android.gms:play-services-ads:25.1.0"
    implementation "com.google.android.ump:user-messaging-platform:4.0.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation project(':unityLibrary')

}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
